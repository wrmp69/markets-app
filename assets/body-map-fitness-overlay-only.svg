  <title id="title">Zones SVG cliquables corps humain fitness</title>
  <desc id="desc">Overlay sans image, à placer au-dessus de l'image de corps humain. Chaque path a un id et data-part.</desc>
  <style>
  :root { --zone: #2563eb; --zone-stroke: #1d4ed8; }
  .base-image { pointer-events: none; }
  .hit {
    fill: var(--zone);
    fill-opacity: 0.001;
    stroke: transparent;
    stroke-width: 2.5;
    cursor: pointer;
    outline: none;
    transition: fill-opacity .14s ease, stroke .14s ease, filter .14s ease;
    pointer-events: all;
  }
  .hit:hover,
  .hit:focus,
  .hit.active {
    fill-opacity: .34;
    stroke: var(--zone-stroke);
    filter: drop-shadow(0 0 5px rgba(37,99,235,.45));
  }
  .hit:focus { stroke-width: 4; }
</style>
