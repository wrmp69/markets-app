<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GymLog K&J" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="theme-color" content="#030609" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f4efe7" media="(prefers-color-scheme: light)" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <title>GymLog K&J</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/app.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
  <script type="module" src="js/app.js"></script>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <div class="eyebrow" id="today-label"></div>
        <h1 id="page-title">Accueil</h1>
      </div>
      <button class="icon-btn" id="theme-toggle" aria-label="Changer le thème">🌙</button>
    </header>

    <main id="view" class="view"></main>

    <nav class="bottom-nav" aria-label="Navigation principale">
      <button class="nav-btn is-active" data-route="home">🏠<span>Accueil</span></button>
      <button class="nav-btn" data-route="session">🏋️<span>Séance</span></button>
      <button class="nav-btn" data-route="history">📋<span>Historique</span></button>
      <button class="nav-btn" data-route="stats">📈<span>Stats</span></button>
      <button class="nav-btn" data-route="settings">⚙️<span>Réglages</span></button>
    </nav>
  </div>

  <div id="toast-root" class="toast-root" aria-live="polite"></div>
  <div id="modal-root"></div>

  <section class="timer" id="timer" aria-hidden="true">
    <div class="timer-card">
      <div class="eyebrow">Repos</div>
      <h2 id="timer-exo">Timer</h2>
      <div class="timer-ring"><svg viewBox="0 0 120 120"><circle class="ring-bg" cx="60" cy="60" r="52"/><circle class="ring-fg" id="timer-ring" cx="60" cy="60" r="52"/></svg><strong id="timer-left">60</strong></div>
      <div class="timer-presets"><button data-timer-set="30">30s</button><button data-timer-set="60">60s</button><button data-timer-set="90">90s</button><button data-timer-set="120">120s</button></div>
      <div class="timer-actions timer-actions-3"><button class="btn secondary" id="timer-skip">Fermer</button><button class="btn secondary" id="timer-minimize">Réduire</button><button class="btn primary" id="timer-restart">Relancer</button></div>
    </div>
  </section>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
